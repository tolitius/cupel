<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 56" width="280" height="56">
  <!-- Cupel logo (dark background variant) -->
  <g transform="translate(4, 4)">
    <!-- Dish rim -->
    <circle cx="24" cy="24" r="22" fill="none" stroke="#D3D1C7" stroke-width="1.8"/>
    <!-- Base metal particles (cool slate, lighter for dark bg) -->
    <circle cx="9" cy="12" r="2" fill="#9EAAB8" opacity="0.55"/>
    <circle cx="6" cy="28" r="1.8" fill="#9EAAB8" opacity="0.5"/>
    <circle cx="12" cy="40" r="1.8" fill="#9EAAB8" opacity="0.52"/>
    <circle cx="28" cy="43" r="1.6" fill="#9EAAB8" opacity="0.46"/>
    <circle cx="40" cy="32" r="1.8" fill="#9EAAB8" opacity="0.52"/>
    <circle cx="40" cy="14" r="1.6" fill="#9EAAB8" opacity="0.46"/>
    <circle cx="28" cy="6" r="1.8" fill="#9EAAB8" opacity="0.5"/>
    <circle cx="16" cy="7" r="1.6" fill="#9EAAB8" opacity="0.44"/>
    <!-- Gold bead -->
    <circle cx="24" cy="24" r="7" fill="#D4A030"/>
    <circle cx="21.5" cy="21" r="2.5" fill="#E8C25C" opacity="0.45"/>
  </g>
  <!-- Wordmark -->
  <text x="64" y="35" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="400" letter-spacing="0.08em" fill="#D3D1C7">cupel</text>
</svg>
