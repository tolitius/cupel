  <circle cx="13" cy="4" r="1" fill="#7A8899" opacity="0.45"/>
  <circle cx="13.5" cy="12" r="1.1" fill="#7A8899" opacity="0.48"/>
  <circle cx="3" cy="12.5" r="1" fill="#7A8899" opacity="0.45"/>
